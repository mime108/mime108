name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: mime108
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=bc252d&color_dots[]=dae8e5&color_dots[]=83a79d&color_dots[]=4d695d&color_dots[]=2c3e38
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
